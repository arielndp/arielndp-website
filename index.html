<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ariel Nunez</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="#home" class="tab active" onclick="switchTab('home', this)">Home</a>
    <a href="#about" class="tab" onclick="switchTab('about', this)">About</a>
    <a href="#projects" class="tab" onclick="switchTab('projects', this)">Projects</a>
    <a href="#contact" class="tab" onclick="switchTab('contact', this)">Contact</a>
  </nav>

  <main>
    <section id="home" class="page active">
      <h1>Ariel Nunez</h1>
    </section>
    <section id="about" class="page"></section>
    <section id="projects" class="page"></section>
    <section id="contact" class="page"></section>
  </main>

  <script>
    function switchTab(id, el) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      el.classList.add('active');
    }
  </script>

</body>
</html>
